<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="shell">

    <!-- TOP HEADER -->
    <header class="app-header">
      <span class="header-brand">💰 Finance Tracker</span>
    </header>

    <!-- KONTEN -->
    <main class="page">

      <!-- SALDO -->
      <div class="saldo-box">
        <small>Total Saldo</small>
        <div class="saldo-nominal" id="saldo">Memuat...</div>
      </div>

      <!-- FORM TAMBAH TRANSAKSI -->
      <div class="card">
        <h3>Tambah Transaksi</h3>
        <form id="form-transaksi">
          <input
            type="text"
            id="deskripsi"
            placeholder="Deskripsi (contoh: Gaji, Makan)"
            required
          />
          <input
            type="number"
            id="jumlah"
            placeholder="Jumlah (Rp)"
            min="1"
            required
          />
          <select id="tipe">
            <option value="pengeluaran">Pengeluaran (−)</option>
            <option value="pemasukan">Pemasukan (+)</option>
          </select>
          <button type="submit" class="btn" id="btn-submit">
            💾 Simpan Transaksi
          </button>
        </form>
      </div>

      <!-- RIWAYAT TRANSAKSI -->
      <div class="card">
        <h3>📋 Riwayat Transaksi</h3>
        <div id="transaksi-list">
          <p class="empty-state">Memuat...</p>
        </div>
      </div>

    </main>

    <!-- BOTTOM TAB BAR -->
    <nav class="bottom-nav">
      <a href="index.html" class="tab-item active">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Dashboard</span>
      </a>
      <a href="laporan.html" class="tab-item">
        <span class="tab-icon">📊</span>
        <span class="tab-label">Laporan</span>
      </a>
    </nav>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-icon" id="modal-icon"></div>
        <p class="modal-message" id="modal-message"></p>
        <button class="modal-btn" id="modal-close">OK</button>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
